<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3D6B5C">
<title>오늘의 체크리스트</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="firebase-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F2F4F1;
    --paper: #FFFFFF;
    --ink: #1F2A24;
    --ink-soft: #5B6B62;
    --accent: #3D6B5C;
    --accent-soft: #DCE7E1;
    --sub: #8B7355;
    --sub-soft: #EFE7DC;
    --line: #D8DDD5;
    --danger: #B5533C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif;
    display:flex; justify-content:center;
    overscroll-behavior-y: contain;
  }
  #app{
    width:100%; max-width:480px; min-height:100vh;
    background:var(--paper);
    display:flex; flex-direction:column;
    box-shadow: 0 0 40px rgba(31,42,36,0.06);
  }
  header{
    padding:22px 20px 14px;
    border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--paper); z-index:5;
  }
  header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:22px; font-weight:700; margin:0 0 2px;
    letter-spacing:-0.02em;
  }
  header .date{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px; color:var(--ink-soft);
  }
  nav.tabs{
    display:flex; border-bottom:1px solid var(--line);
    background:var(--paper); position:sticky; top:64px; z-index:5;
  }
  nav.tabs button{
    flex:1; padding:12px 0; border:none; background:none;
    font-family:'IBM Plex Sans KR', sans-serif; font-size:14px; font-weight:500;
    color:var(--ink-soft); cursor:pointer; position:relative;
  }
  nav.tabs button.active{ color:var(--accent); font-weight:600; }
  nav.tabs button.active::after{
    content:''; position:absolute; left:20%; right:20%; bottom:-1px; height:2px;
    background:var(--accent); border-radius:2px;
  }
  main{ flex:1; overflow-y:auto; padding-bottom:24px; }
  .view{ display:none; }
  .view.active{ display:block; }

  /* ---- LIST VIEW ---- */
  #list-container{ padding:8px 16px 4px; }
  .empty-hint{
    text-align:center; color:var(--ink-soft); font-size:13px;
    padding:40px 20px; line-height:1.6;
  }
  .task{
    border-bottom:1px dashed var(--line);
    padding:12px 0 10px;
  }
  .task-row{
    display:flex; align-items:flex-start; gap:10px;
  }
  .checkbox{
    width:22px; height:22px; min-width:22px; margin-top:2px;
    border:2px solid var(--accent); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; background:var(--paper);
    transition: background .15s, transform .1s;
  }
  .checkbox:active{ transform:scale(0.9); }
  .checkbox svg{ width:14px; height:14px; opacity:0; transition:opacity .1s; }
  .task-text{
    flex:1; font-size:15.5px; line-height:1.5; padding-top:1px;
    word-break: break-word;
  }
  .task-actions{ display:flex; gap:2px; }
  .icon-btn{
    border:none; background:none; cursor:pointer; color:var(--ink-soft);
    padding:4px; font-size:16px; line-height:1; border-radius:6px;
  }
  .icon-btn:active{ background:var(--accent-soft); }
  .subtasks{
    margin:8px 0 0 32px; padding-left:12px;
    border-left:2px solid var(--sub-soft);
  }
  .subtask{
    display:flex; align-items:flex-start; gap:8px;
    padding:6px 0;
  }
  .subtask .checkbox{
    width:18px; height:18px; min-width:18px;
    border-color:var(--sub);
  }
  .subtask .task-text{ font-size:14px; color:var(--ink); }
  .subtask-input-row{
    display:flex; align-items:center; gap:8px; padding:6px 0;
  }
  .subtask-input-row .checkbox{
    width:18px; height:18px; min-width:18px; border-style:dashed; border-color:var(--sub);
  }
  .sub-input{
    flex:1; border:none; border-bottom:1px solid var(--sub-soft);
    font-size:14px; font-family:inherit; background:transparent;
    padding:4px 2px; color:var(--ink);
  }
  .sub-input:focus{ outline:none; border-color:var(--sub); }

  .new-task-row{
    display:flex; align-items:center; gap:10px;
    padding:14px 0; margin-top:2px;
  }
  .new-task-row .checkbox{
    border-style:dashed; border-color:var(--ink-soft); opacity:.6;
  }
  #new-task-input{
    flex:1; border:none; font-size:15.5px; font-family:inherit;
    background:transparent; color:var(--ink); padding:4px 2px;
  }
  #new-task-input:focus{ outline:none; }
  #new-task-input::placeholder{ color:#A9B3AC; }

  /* ---- CALENDAR VIEW ---- */
  #calendar-container{ padding:16px 16px 4px; }
  .cal-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .cal-header .month-label{
    font-family:'Space Grotesk', sans-serif; font-size:17px; font-weight:700;
  }
  .cal-header button{
    border:none; background:var(--accent-soft); color:var(--accent);
    width:30px; height:30px; border-radius:8px; font-size:15px; cursor:pointer;
  }
  .cal-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
    margin-bottom:16px;
  }
  .cal-dow{
    text-align:center; font-size:11px; color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace; padding-bottom:4px;
  }
  .cal-day{
    aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px;
    font-size:13px; cursor:pointer; background:var(--bg); color:var(--ink);
    border:1px solid transparent;
  }
  .cal-day.empty{ visibility:hidden; }
  .cal-day.has-record{ background:var(--accent-soft); font-weight:600; }
  .cal-day.today{ border-color:var(--accent); }
  .cal-day.selected{ background:var(--accent); color:#fff; }
  .cal-day .dot{
    width:4px; height:4px; border-radius:50%; background:var(--accent);
  }
  .cal-day.selected .dot{ background:#fff; }

  .day-detail{
    border-top:1px solid var(--line); padding-top:14px;
  }
  .day-detail h3{
    font-family:'Space Grotesk', sans-serif; font-size:14px; margin:0 0 10px;
    color:var(--ink-soft); font-weight:500;
  }
  .record-item{
    display:flex; align-items:baseline; gap:10px;
    padding:8px 0; border-bottom:1px dashed var(--line);
  }
  .record-item .time{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--accent);
    min-width:48px;
  }
  .record-item .text{ font-size:14px; flex:1; }
  .record-item .text .parent-tag{
    font-size:11px; color:var(--sub); display:block; margin-top:1px;
  }
  .no-record{ color:var(--ink-soft); font-size:13px; padding:12px 0; }

  ::-webkit-scrollbar{ width:0; }

  #login-overlay{
    position:fixed; inset:0; background:var(--bg); z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px; text-align:center; gap:18px;
  }
  #login-overlay h2{
    font-family:'Space Grotesk', sans-serif; font-size:20px; margin:0;
  }
  #login-overlay p{
    font-size:13.5px; color:var(--ink-soft); line-height:1.6; margin:0; max-width:280px;
  }
  #login-btn{
    display:flex; align-items:center; gap:10px;
    background:var(--paper); border:1px solid var(--line); border-radius:10px;
    padding:11px 20px; font-size:14px; font-weight:500; color:var(--ink);
    cursor:pointer;
  }
  #login-btn:active{ background:var(--accent-soft); }
  .sync-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 20px 0;
  }
  .sync-bar .user-label{
    font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace;
  }
  #logout-btn{
    border:none; background:none; color:var(--ink-soft); font-size:11px;
    cursor:pointer; text-decoration:underline; display:none;
  }
</style>
</head>
<body>
<div id="login-overlay">
  <h2>오늘의 체크리스트</h2>
  <p>Google 계정으로 로그인하면 휴대폰, 노트북 등 어떤 기기에서든 같은 할 일 목록과 기록이 실시간으로 동기화돼요.</p>
  <button id="login-btn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.4 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.4 5.1 29.5 3 24 3c-7.5 0-14 4.2-17.7 10.7z"/><path fill="#4CAF50" d="M24 45c5.4 0 10.3-1.9 14-5.1l-6.5-5.5C29.4 36.1 26.8 37 24 37c-5.3 0-9.7-3.1-11.3-7.6l-6.6 5.1C9.9 40.7 16.4 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.5 5.5C41.4 36.1 45 30.5 45 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
    Google로 로그인
  </button>
</div>
<div id="app">
  <header>
    <h1>오늘의 체크리스트</h1>
    <div class="date" id="today-label"></div>
  </header>
  <div class="sync-bar">
    <div class="user-label" id="user-label"></div>
    <button id="logout-btn">로그아웃</button>
  </div>
  <nav class="tabs">
    <button id="tab-list" class="active">할 일</button>
    <button id="tab-calendar">기록</button>
  </nav>
  <main>
    <section id="view-list" class="view active">
      <div id="list-container"></div>
      <div style="padding:0 16px;">
        <div class="new-task-row">
          <div class="checkbox"></div>
          <input id="new-task-input" type="text" placeholder="할 일을 입력하고 Enter" autocomplete="off">
        </div>
      </div>
    </section>
    <section id="view-calendar" class="view">
      <div id="calendar-container"></div>
    </section>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, onSnapshot, enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseApp = initializeApp(window.firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
try{ await enableIndexedDbPersistence(db); }catch(e){ /* 여러 탭이 열려있으면 실패할 수 있음, 무시해도 됨 */ }

let state = { tasks: [], records: [] };
let currentUid = null;
let unsubscribeSnap = null;

const loginOverlay = document.getElementById('login-overlay');
const loginBtn = document.getElementById('login-btn');
const logoutBtn = document.getElementById('logout-btn');
const userLabel = document.getElementById('user-label');

loginBtn.onclick = () => {
  signInWithPopup(auth, new GoogleAuthProvider())
    .catch(err => alert('로그인에 실패했어요: ' + err.message));
};
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  if(unsubscribeSnap){ unsubscribeSnap(); unsubscribeSnap = null; }
  if(user){
    currentUid = user.uid;
    loginOverlay.style.display = 'none';
    userLabel.textContent = user.displayName || user.email || '동기화 중';
    logoutBtn.style.display = '';
    const ref = doc(db, 'users', currentUid);
    unsubscribeSnap = onSnapshot(ref, (snap) => {
      if(snap.exists()){
        const data = snap.data();
        state.tasks = data.tasks || [];
        state.records = data.records || [];
      } else {
        state = { tasks: [], records: [] };
        setDoc(ref, state);
      }
      renderList();
      if(document.getElementById('view-calendar').classList.contains('active')) renderCalendar();
    }, (err) => {
      console.error(err);
    });
  } else {
    currentUid = null;
    state = { tasks: [], records: [] };
    loginOverlay.style.display = 'flex';
    logoutBtn.style.display = 'none';
    renderList();
  }
});

function save(){
  if(!currentUid) return;
  const ref = doc(db, 'users', currentUid);
  // 화면 전용 임시 상태(하위 할일 입력창 열림 여부 등)는 동기화 데이터에서 제외
  const cleanTasks = state.tasks.map(t => ({
    id: t.id,
    text: t.text,
    subtasks: (t.subtasks || []).map(s => ({ id: s.id, text: s.text }))
  }));
  setDoc(ref, { tasks: cleanTasks, records: state.records }).catch(err => console.error(err));
}
function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function pad(n){ return n.toString().padStart(2,'0'); }
function dateKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function timeLabel(d){ return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }

const checkSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

/* ---------- Header date ---------- */
const todayLabelEl = document.getElementById('today-label');
function renderTodayLabel(){
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  todayLabelEl.textContent = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} (${days[d.getDay()]})`;
}

/* ---------- Tabs ---------- */
const tabList = document.getElementById('tab-list');
const tabCal = document.getElementById('tab-calendar');
const viewList = document.getElementById('view-list');
const viewCal = document.getElementById('view-calendar');
tabList.onclick = () => switchTab('list');
tabCal.onclick = () => switchTab('calendar');
function switchTab(name){
  const isList = name === 'list';
  tabList.classList.toggle('active', isList);
  tabCal.classList.toggle('active', !isList);
  viewList.classList.toggle('active', isList);
  viewCal.classList.toggle('active', !isList);
  if(!isList) renderCalendar();
}

/* ---------- List rendering ---------- */
const listContainer = document.getElementById('list-container');
const newTaskInput = document.getElementById('new-task-input');

function renderList(){
  listContainer.innerHTML = '';
  if(state.tasks.length === 0){
    const hint = document.createElement('div');
    hint.className = 'empty-hint';
    hint.textContent = '아래 입력창에 할 일을 적고 Enter를 누르면\n체크리스트가 시작돼요.';
    listContainer.appendChild(hint);
    return;
  }
  state.tasks.forEach(task => {
    listContainer.appendChild(renderTask(task));
  });
}

function renderTask(task){
  const wrap = document.createElement('div');
  wrap.className = 'task';

  const row = document.createElement('div');
  row.className = 'task-row';

  const box = document.createElement('div');
  box.className = 'checkbox';
  box.innerHTML = checkSvg;
  box.onclick = () => completeTask(task.id);

  const text = document.createElement('div');
  text.className = 'task-text';
  text.textContent = task.text;

  const actions = document.createElement('div');
  actions.className = 'task-actions';
  const addSubBtn = document.createElement('button');
  addSubBtn.className = 'icon-btn';
  addSubBtn.textContent = '＋';
  addSubBtn.title = '하위 할일 추가';
  addSubBtn.onclick = () => toggleSubInput(task.id);
  const delBtn = document.createElement('button');
  delBtn.className = 'icon-btn';
  delBtn.textContent = '✕';
  delBtn.title = '삭제';
  delBtn.onclick = () => deleteTask(task.id);
  actions.appendChild(addSubBtn);
  actions.appendChild(delBtn);

  row.appendChild(box);
  row.appendChild(text);
  row.appendChild(actions);
  wrap.appendChild(row);

  const subWrap = document.createElement('div');
  subWrap.className = 'subtasks';
  subWrap.id = `sub-${task.id}`;

  (task.subtasks || []).forEach(sub => {
    subWrap.appendChild(renderSubtask(task.id, sub));
  });

  if(task._showSubInput){
    const inputRow = document.createElement('div');
    inputRow.className = 'subtask-input-row';
    const dashBox = document.createElement('div');
    dashBox.className = 'checkbox';
    const input = document.createElement('input');
    input.className = 'sub-input';
    input.placeholder = '하위 할일 입력 후 Enter';
    input.autocomplete = 'off';
    input.onkeydown = (e) => {
      if(e.key === 'Enter' && input.value.trim()){
        addSubtask(task.id, input.value.trim());
        input.value = '';
      }
    };
    inputRow.appendChild(dashBox);
    inputRow.appendChild(input);
    subWrap.appendChild(inputRow);
    setTimeout(() => input.focus(), 0);
  }

  if(subWrap.childNodes.length){
    wrap.appendChild(subWrap);
  }

  return wrap;
}

function renderSubtask(taskId, sub){
  const row = document.createElement('div');
  row.className = 'subtask';
  const box = document.createElement('div');
  box.className = 'checkbox';
  box.innerHTML = checkSvg;
  box.onclick = () => completeSubtask(taskId, sub.id);
  const text = document.createElement('div');
  text.className = 'task-text';
  text.textContent = sub.text;
  const delBtn = document.createElement('button');
  delBtn.className = 'icon-btn';
  delBtn.textContent = '✕';
  delBtn.onclick = () => deleteSubtask(taskId, sub.id);
  row.appendChild(box);
  row.appendChild(text);
  row.appendChild(delBtn);
  return row;
}

/* ---------- Actions ---------- */
newTaskInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && newTaskInput.value.trim()){
    const t = { id: uid(), text: newTaskInput.value.trim(), subtasks: [] };
    state.tasks.push(t);
    save();
    newTaskInput.value = '';
    renderList();
    newTaskInput.focus();
  }
});

function toggleSubInput(taskId){
  const t = state.tasks.find(t => t.id === taskId);
  if(t){ t._showSubInput = !t._showSubInput; renderList(); }
}

function addSubtask(taskId, text){
  const t = state.tasks.find(t => t.id === taskId);
  if(!t) return;
  t.subtasks = t.subtasks || [];
  t.subtasks.push({ id: uid(), text });
  t._showSubInput = true;
  save();
  renderList();
}

function deleteSubtask(taskId, subId){
  const t = state.tasks.find(t => t.id === taskId);
  if(!t) return;
  t.subtasks = (t.subtasks || []).filter(s => s.id !== subId);
  save();
  renderList();
}

function deleteTask(taskId){
  state.tasks = state.tasks.filter(t => t.id !== taskId);
  save();
  renderList();
}

function completeSubtask(taskId, subId){
  const t = state.tasks.find(t => t.id === taskId);
  if(!t) return;
  const sub = (t.subtasks || []).find(s => s.id === subId);
  if(!sub) return;
  const now = new Date();
  state.records.push({
    id: uid(), text: sub.text, parentText: t.text,
    date: dateKey(now), time: timeLabel(now), ts: now.getTime()
  });
  t.subtasks = t.subtasks.filter(s => s.id !== subId);
  save();
  renderList();
}

function completeTask(taskId){
  const t = state.tasks.find(t => t.id === taskId);
  if(!t) return;
  const now = new Date();
  state.records.push({
    id: uid(), text: t.text, parentText: null,
    date: dateKey(now), time: timeLabel(now), ts: now.getTime()
  });
  // 남은 하위 할일은 독립된 할 일로 승격
  const leftoverSubs = (t.subtasks || []).map(s => ({ id: uid(), text: s.text, subtasks: [] }));
  state.tasks = state.tasks.filter(task => task.id !== taskId);
  state.tasks.push(...leftoverSubs);
  save();
  renderList();
}

/* ---------- Calendar ---------- */
let calCursor = new Date();
calCursor.setDate(1);
let selectedDateKey = null;

const calContainer = document.getElementById('calendar-container');

function renderCalendar(){
  calContainer.innerHTML = '';

  const header = document.createElement('div');
  header.className = 'cal-header';
  const prevBtn = document.createElement('button');
  prevBtn.textContent = '‹';
  prevBtn.onclick = () => { calCursor.setMonth(calCursor.getMonth()-1); renderCalendar(); };
  const nextBtn = document.createElement('button');
  nextBtn.textContent = '›';
  nextBtn.onclick = () => { calCursor.setMonth(calCursor.getMonth()+1); renderCalendar(); };
  const label = document.createElement('div');
  label.className = 'month-label';
  label.textContent = `${calCursor.getFullYear()}년 ${calCursor.getMonth()+1}월`;
  header.appendChild(prevBtn);
  header.appendChild(label);
  header.appendChild(nextBtn);
  calContainer.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'cal-grid';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const year = calCursor.getFullYear();
  const month = calCursor.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayKey = dateKey(new Date());

  const recordDates = new Set(state.records.map(r => r.date));

  for(let i=0; i<firstDow; i++){
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }
  for(let day=1; day<=daysInMonth; day++){
    const key = `${year}-${pad(month+1)}-${pad(day)}`;
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if(key === todayKey) cell.classList.add('today');
    if(recordDates.has(key)) cell.classList.add('has-record');
    if(key === selectedDateKey) cell.classList.add('selected');
    const num = document.createElement('div');
    num.textContent = day;
    cell.appendChild(num);
    if(recordDates.has(key)){
      const dot = document.createElement('div');
      dot.className = 'dot';
      cell.appendChild(dot);
    }
    cell.onclick = () => { selectedDateKey = key; renderCalendar(); };
    grid.appendChild(cell);
  }
  calContainer.appendChild(grid);

  const detail = document.createElement('div');
  detail.className = 'day-detail';
  const h3 = document.createElement('h3');
  const activeKey = selectedDateKey || todayKey;
  h3.textContent = activeKey === todayKey ? '오늘 완료한 할 일' : `${activeKey} 완료한 할 일`;
  detail.appendChild(h3);

  const dayRecords = state.records
    .filter(r => r.date === activeKey)
    .sort((a,b) => a.ts - b.ts);

  if(dayRecords.length === 0){
    const empty = document.createElement('div');
    empty.className = 'no-record';
    empty.textContent = '완료된 할 일이 없어요.';
    detail.appendChild(empty);
  } else {
    dayRecords.forEach(r => {
      const item = document.createElement('div');
      item.className = 'record-item';
      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = r.time;
      const text = document.createElement('div');
      text.className = 'text';
      text.textContent = r.text;
      if(r.parentText){
        const tag = document.createElement('span');
        tag.className = 'parent-tag';
        tag.textContent = `↳ ${r.parentText}의 하위 할일`;
        text.appendChild(tag);
      }
      item.appendChild(time);
      item.appendChild(text);
      detail.appendChild(item);
    });
  }
  calContainer.appendChild(detail);
}

/* ---------- Init ---------- */
renderTodayLabel();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
